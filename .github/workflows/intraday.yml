name: 盤中快報 - 每小時即時訊號

on:
  schedule:
    # 平日 9:13–13:13 TST = 1:13–5:13 UTC，每小時 13 分（避開整點尖峰）
    - cron: "13 1,2,3,4,5 * * 1-5"
  workflow_dispatch:

jobs:
  intraday-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run intraday alert
        env:
          FINMIND_TOKENS: ${{ secrets.FINMIND_TOKENS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.intraday_job
