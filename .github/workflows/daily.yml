name: 日報 - 籌碼動能快報

on:
  workflow_dispatch:  # 僅保留手動觸發；排程已移至 GCP crontab

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning briefing (07:30 TST)
        if: github.event_name == 'schedule' && contains(github.event.schedule, '30 23')
        env:
          FINMIND_TOKENS: ${{ secrets.FINMIND_TOKENS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.morning_job

      - name: Run daily report (18:30 TST)
        if: github.event_name == 'workflow_dispatch' || contains(github.event.schedule, '30 10')
        env:
          FINMIND_TOKENS: ${{ secrets.FINMIND_TOKENS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.daily_job